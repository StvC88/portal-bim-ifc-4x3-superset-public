services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bimportal
      POSTGRES_USER: bimportal
      POSTGRES_PASSWORD: bimportal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bimportal -d bimportal"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://bimportal:bimportal@postgres:5432/bimportal
      UPLOAD_DIR: /data/uploads
      CONVERTED_DIR: /data/converted
      SUPERSET_URL: http://localhost:8088
      SUPERSET_INTERNAL_URL: http://superset:8088
      SUPERSET_ADMIN_USER: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_DASHBOARD_ID: ""
    ports:
      - "8010:8000"
    volumes:
      - ./storage/uploads:/data/uploads
      - ./storage/converted:/data/converted
    depends_on:
      postgres:
        condition: service_healthy

  portal-web:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: /api
      VITE_SUPERSET_URL: http://localhost:8088
    ports:
      - "5175:5173"
    depends_on:
      - api

volumes:
  postgres_data:
